# SPDX-License-Identifier: AGPL-3.0-or-later
[workspace]
resolver = "2"
members = [
    "crates/anarchie-rm",
    "crates/anarchie-cli",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.80"
license = "AGPL-3.0-or-later"
repository = "https://github.com/pacharanero/anarchie"
authors = ["The anarchie contributors"]

[workspace.dependencies]
anarchie-rm = { path = "crates/anarchie-rm" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["preserve_order"] }
thiserror = "2.0.16"
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
