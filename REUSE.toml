version = 1

# Files that cannot carry an inline SPDX header (Markdown, JSON, TOML, the
# lockfile, test fixtures, config). Source files (.rs, shell, YAML) carry their
# own two-line header; this file covers the rest.
#
# anarchie's own written prose - the README, the docs site, and the specs - is
# the house-style content licence, CC-BY-SA-4.0. Code-adjacent config and data
# (manifests, the lockfile, ignore files, sample CDR, fixtures) stay under the
# project code licence, AGPL-3.0-or-later.

[[annotations]]
path = [
  "README.md",
  "docs/**",
  "specs/**",
]
SPDX-FileCopyrightText = "2026 Marcus Baw and Baw Medical Ltd"
SPDX-License-Identifier = "CC-BY-SA-4.0"

[[annotations]]
path = [
  "Cargo.toml",
  "Cargo.lock",
  "requirements.txt",
  "mkdocs.yml",
  ".gitignore",
  "**/.gitignore",
  "my-cdr/**",
  "tests/fixtures/**",
]
SPDX-FileCopyrightText = "2026 Marcus Baw and Baw Medical Ltd"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Bundled Operational Templates: derivatives of openEHR International (CKM)
# archetypes, redistributed under CC-BY-SA-3.0. Per-template provenance is in
# src/store/starter/templates/attribution.md.

[[annotations]]
path = [
  "src/store/starter/templates/*.opt.json",
  "src/store/starter/templates/attribution.md",
]
SPDX-FileCopyrightText = "openEHR Foundation and contributors (see src/store/starter/templates/attribution.md)"
SPDX-License-Identifier = "CC-BY-SA-3.0"
